name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

jobs:
  # Python MVP checks - always runs
  python-mvp:
    name: Python MVP
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "mvp/uv.lock"

      - name: Install dependencies
        working-directory: ./mvp
        run: uv sync

      - name: Lint with Ruff
        working-directory: ./mvp
        run: uv run ruff check src/ --output-format=github

      - name: Format Check with Black
        working-directory: ./mvp
        run: uv run black --check --diff src/

      - name: Test MVP imports
        working-directory: ./mvp
        run: |
          uv run python -c "from mvp.minimal import create_sample_dem_ascii; print('Import OK')"
          uv run python -c "from mvp.main import main; print('Main import OK')"

      - name: Run MVP pipeline
        working-directory: ./mvp
        run: |
          set +e
          timeout 60 uv run nidelven --sample --skip-render
          exit_code=$?
          set -e
          if [ $exit_code -eq 124 ]; then
            echo "::warning::MVP pipeline timed out (non-blocking)"
          elif [ $exit_code -ne 0 ]; then
            echo "Pipeline failed with exit code $exit_code"
            exit $exit_code
          fi

      - name: Run tests
        working-directory: ./mvp
        run: uv run pytest tests/ -v

  # Unity checks - only runs if secrets are configured
  check-unity-secrets:
    name: Check Unity Secrets
    runs-on: ubuntu-latest
    outputs:
      has_secrets: ${{ steps.check.outputs.has_secrets }}
    steps:
      - id: check
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        run: |
          if [ -n "$UNITY_LICENSE" ] && [ -n "$UNITY_EMAIL" ] && [ -n "$UNITY_PASSWORD" ]; then
            echo "has_secrets=true" >> $GITHUB_OUTPUT
            echo "Unity secrets configured"
          else
            echo "has_secrets=false" >> $GITHUB_OUTPUT
            echo "Unity secrets NOT configured - skipping Unity tests"
          fi

  unity-test:
    name: Unity Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: check-unity-secrets
    if: needs.check-unity-secrets.outputs.has_secrets == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Prepare for CI (workaround ShaderGraph GUID issue)
        run: bash .github/scripts/prepare-ci.sh

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-

      - name: Run Tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: 6000.4.5f1
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          customParameters: -nographics -batchmode

  unity-build:
    name: Unity Build
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [check-unity-secrets, unity-test]
    # Build requires Unity secrets and a scene in EditorBuildSettings
    if: needs.check-unity-secrets.outputs.has_secrets == 'true' && github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        targetPlatform:
          - StandaloneWindows64
          - StandaloneLinux64
          - StandaloneOSX
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Prepare for CI (workaround ShaderGraph GUID issue)
        run: bash .github/scripts/prepare-ci.sh

      - name: Generate terrain data for build
        run: |
          pip install -q numpy scipy pillow
          mkdir -p Assets/StreamingAssets
          cd mvp
          python -c "
          import sys
          sys.path.insert(0, 'src')
          from pathlib import Path
          from mvp.dem_downloader import create_sample_dem
          from mvp.terrain_mesh import export_unity_raw, load_dem
          from mvp.river_flow import (
              compute_flow_accumulation, trace_river_d8, smooth_path,
              calculate_flow_properties, export_river_path_json,
              compute_river_widths_from_accumulation
          )
          import numpy as np

          # Generate terrain.raw via file-based pipeline
          dem_path = Path('/tmp/sample_dem.tif')
          create_sample_dem(dem_path, size=256)
          export_unity_raw(dem_path, Path('../Assets/StreamingAssets'), resolution=257)

          # Generate river_path.json using D8 flow accumulation
          dem_data, dem_meta = load_dem(dem_path)
          acc = compute_flow_accumulation(dem_data)
          path = trace_river_d8(dem_data, accumulation=acc)
          if len(path) >= 4:
              smooth = smooth_path(path, num_points=100)
              metadata = {'width': dem_data.shape[1], 'height': dem_data.shape[0]}
              flow_data = calculate_flow_properties(smooth, dem_data, metadata)
              # Use D8 widths from upstream drainage area
              flow_data['widths'] = compute_river_widths_from_accumulation(acc, [(int(r), int(c)) for r, c in smooth])
              export_river_path_json(flow_data, metadata, Path('../Assets/StreamingAssets/river_path.json'))

          # Generate weather_data.json (offline/seasonal)
          from mvp.weather import export_weather_json
          export_weather_json(Path('../Assets/StreamingAssets/weather_data.json'), fetch_live=False)

          # Generate terrain splatmap
          from mvp.terrain_textures import export_splatmap
          export_splatmap(dem_data, Path('../Assets/StreamingAssets/terrain_splatmap.png'), accumulation=acc)

          print('Terrain + river path + weather + splatmap exported to StreamingAssets')
          "

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ matrix.targetPlatform }}-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-${{ matrix.targetPlatform }}-
            Library-

      - name: Build
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: 6000.4.5f1
          targetPlatform: ${{ matrix.targetPlatform }}
          buildName: NidelvenRiverAdventure
          customParameters: -nographics
          versioning: None
          allowDirtyBuild: true

      - name: Upload Build
        uses: actions/upload-artifact@v7
        with:
          name: Build-${{ matrix.targetPlatform }}
          path: build/${{ matrix.targetPlatform }}
          retention-days: 7
