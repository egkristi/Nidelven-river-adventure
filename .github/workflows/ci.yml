name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read
  checks: write

jobs:
  # Python MVP checks - always runs
  python-mvp:
    name: Python MVP
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "mvp/uv.lock"

      - name: Install dependencies
        working-directory: ./mvp
        run: uv sync

      - name: Lint with Ruff
        working-directory: ./mvp
        run: uv run ruff check src/ --output-format=github

      - name: Format Check with Black
        working-directory: ./mvp
        run: uv run black --check --diff src/

      - name: Test MVP imports
        working-directory: ./mvp
        run: |
          uv run python -c "from mvp.minimal import create_sample_dem_ascii; print('Import OK')"
          uv run python -c "from mvp.main import main; print('Main import OK')"

      - name: Run MVP pipeline
        working-directory: ./mvp
        run: |
          timeout 60 uv run mvp --sample --skip-render || echo "MVP pipeline timed out (non-blocking)"

      - name: Run tests
        working-directory: ./mvp
        run: uv run pytest tests/ -v

  # Unity checks - only runs if secrets are configured
  check-unity-secrets:
    name: Check Unity Secrets
    runs-on: ubuntu-latest
    outputs:
      has_secrets: ${{ steps.check.outputs.has_secrets }}
    steps:
      - id: check
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        run: |
          if [ -n "$UNITY_LICENSE" ] && [ -n "$UNITY_EMAIL" ] && [ -n "$UNITY_PASSWORD" ]; then
            echo "has_secrets=true" >> $GITHUB_OUTPUT
            echo "Unity secrets configured"
          else
            echo "has_secrets=false" >> $GITHUB_OUTPUT
            echo "Unity secrets NOT configured - skipping Unity tests"
          fi

  unity-test:
    name: Unity Test
    runs-on: ubuntu-latest
    needs: check-unity-secrets
    if: needs.check-unity-secrets.outputs.has_secrets == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Prepare for CI (workaround ShaderGraph GUID issue)
        run: |
          # Remove URP to avoid ShaderGraph package GUID compilation error in Docker
          python3 -c "
          import json
          with open('Packages/manifest.json', 'r') as f:
              m = json.load(f)
          m['dependencies'].pop('com.unity.render-pipelines.universal', None)
          with open('Packages/manifest.json', 'w') as f:
              json.dump(m, f, indent=2)
          "
          # Add CI-specific scripting defines
          printf '%s\n' '-define:DISABLESTEAMWORKS' '-define:DISABLE_URP' > Assets/csc.rsp

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-

      - name: Run Tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: 6000.4.5f1
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          customParameters: -nographics -batchmode

  unity-build:
    name: Unity Build
    runs-on: ubuntu-latest
    needs: [check-unity-secrets, unity-test]
    # Build requires Unity secrets and a scene in EditorBuildSettings
    if: needs.check-unity-secrets.outputs.has_secrets == 'true' && github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        targetPlatform:
          - StandaloneWindows64
          - StandaloneLinux64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Prepare for CI (workaround ShaderGraph GUID issue)
        run: |
          python3 -c "
          import json
          with open('Packages/manifest.json', 'r') as f:
              m = json.load(f)
          m['dependencies'].pop('com.unity.render-pipelines.universal', None)
          with open('Packages/manifest.json', 'w') as f:
              json.dump(m, f, indent=2)
          "
          printf '%s\n' '-define:DISABLESTEAMWORKS' '-define:DISABLE_URP' > Assets/csc.rsp

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ matrix.targetPlatform }}-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-${{ matrix.targetPlatform }}-
            Library-

      - name: Build
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: 6000.4.5f1
          targetPlatform: ${{ matrix.targetPlatform }}
          buildName: NidelvenRiverAdventure
          customParameters: -nographics
          versioning: None
          allowDirtyBuild: true

      - name: Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: Build-${{ matrix.targetPlatform }}
          path: build/${{ matrix.targetPlatform }}
          retention-days: 7
