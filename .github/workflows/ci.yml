name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
  UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
  UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}

jobs:
  # Python MVP checks - always runs
  python-mvp:
    name: Python MVP
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install UV
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.11.0"

      - name: Sync Dependencies
        working-directory: ./mvp
        run: uv sync --all-extras || uv pip install -e . --system

      - name: Lint with Ruff
        working-directory: ./mvp
        run: uv run ruff check . --output-format=github || python3 -m ruff check . --output-format=github || true

      - name: Format Check with Black
        working-directory: ./mvp
        run: uv run black --check --diff . || python3 -m black --check --diff . || true

      - name: Test MVP Minimal Runs
        working-directory: ./mvp
        run: |
          python3 -c "from mvp.minimal import create_sample_dem_ascii; print('Import OK')" || true
          timeout 10 python3 minimal.py || echo "Minimal MVP runs (timeout expected)"

  # Unity checks - only runs if secrets are configured
  check-unity-secrets:
    name: Check Unity Secrets
    runs-on: ubuntu-latest
    outputs:
      has_secrets: ${{ steps.check.outputs.has_secrets }}
    steps:
      - id: check
        run: |
          if [ -n "$UNITY_LICENSE" ] && [ -n "$UNITY_EMAIL" ] && [ -n "$UNITY_PASSWORD" ]; then
            echo "has_secrets=true" >> $GITHUB_OUTPUT
            echo "Unity secrets configured"
          else
            echo "has_secrets=false" >> $GITHUB_OUTPUT
            echo "Unity secrets NOT configured - skipping Unity tests"
          fi

  unity-test:
    name: Unity Test
    runs-on: ubuntu-latest
    needs: check-unity-secrets
    if: needs.check-unity-secrets.outputs.has_secrets == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-

      - name: Run Tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          githubToken: ${{ secrets.GITHUB_TOKEN }}

  unity-build:
    name: Unity Build
    runs-on: ubuntu-latest
    needs: [check-unity-secrets, unity-test]
    if: needs.check-unity-secrets.outputs.has_secrets == 'true' && github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        targetPlatform:
          - StandaloneWindows64
          - StandaloneLinux64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ matrix.targetPlatform }}-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-${{ matrix.targetPlatform }}-
            Library-

      - name: Build
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: ${{ matrix.targetPlatform }}
          buildName: NidelvenRiverAdventure

      - name: Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: Build-${{ matrix.targetPlatform }}
          path: build/${{ matrix.targetPlatform }}
