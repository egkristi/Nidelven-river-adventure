name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # Check if Unity secrets are configured
  check-secrets:
    name: Check Secrets
    runs-on: ubuntu-latest
    outputs:
      has_unity: ${{ steps.check.outputs.has_unity }}
    steps:
      - id: check
        run: |
          if [ -n "${{ secrets.UNITY_LICENSE }}" ] && [ -n "${{ secrets.UNITY_EMAIL }}" ] && [ -n "${{ secrets.UNITY_PASSWORD }}" ]; then
            echo "has_unity=true" >> $GITHUB_OUTPUT
            echo "Unity secrets configured"
          else
            echo "has_unity=false" >> $GITHUB_OUTPUT
            echo "Unity secrets NOT configured - will create source-only release"
          fi

  # Build Unity if secrets are available
  build-unity:
    name: Build Unity (${{ matrix.targetPlatform }})
    runs-on: ubuntu-latest
    needs: check-secrets
    if: needs.check-secrets.outputs.has_unity == 'true'
    strategy:
      fail-fast: false
      matrix:
        targetPlatform:
          - StandaloneWindows64
          - StandaloneLinux64
          - StandaloneOSX
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Prepare for CI (workaround ShaderGraph GUID issue)
        run: |
          python3 -c "
          import json
          with open('Packages/manifest.json', 'r') as f:
              m = json.load(f)
          m['dependencies'].pop('com.unity.render-pipelines.universal', None)
          with open('Packages/manifest.json', 'w') as f:
              json.dump(m, f, indent=2)
          "
          printf '%s\n' '-define:DISABLESTEAMWORKS' '-define:DISABLE_URP' > Assets/csc.rsp

      - name: Generate terrain data for build
        run: |
          pip install -q numpy scipy pillow
          mkdir -p Assets/StreamingAssets
          cd mvp
          python -c "
          import sys
          sys.path.insert(0, 'src')
          from pathlib import Path
          from mvp.dem_downloader import create_sample_dem
          from mvp.terrain_mesh import export_unity_raw
          from mvp.river_flow import find_start_point, trace_river_path, smooth_path, calculate_flow_properties, export_river_path_json
          import numpy as np

          # Generate terrain.raw via file-based pipeline
          dem_path = Path('/tmp/sample_dem.tif')
          create_sample_dem(dem_path, size=256)
          export_unity_raw(dem_path, Path('../Assets/StreamingAssets'), resolution=257)

          # Generate river_path.json from the DEM file
          from mvp.terrain_mesh import load_dem
          dem_data, dem_meta = load_dem(dem_path)
          start = find_start_point(dem_data, 'left')
          path = trace_river_path(dem_data, start)
          if len(path) >= 4:
              smooth = smooth_path(path, num_points=100)
              metadata = {'width': dem_data.shape[1], 'height': dem_data.shape[0]}
              flow_data = calculate_flow_properties(smooth, dem_data, metadata)
              export_river_path_json(flow_data, metadata, Path('../Assets/StreamingAssets/river_path.json'))
          print('Terrain + river path exported to StreamingAssets')
          "

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ matrix.targetPlatform }}-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-${{ matrix.targetPlatform }}-
            Library-

      - name: Build Unity
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: '6000.4.5f1'
          targetPlatform: ${{ matrix.targetPlatform }}
          buildName: NidelvenRiverAdventure

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Build-${{ matrix.targetPlatform }}
          path: build/${{ matrix.targetPlatform }}

  # Create release (with or without Unity builds)
  release:
    name: Create Release
    needs: [check-secrets, build-unity]
    if: always() && !cancelled() && needs.check-secrets.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Unity Artifacts
        if: needs.check-secrets.outputs.has_unity == 'true'
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare Release Assets
        run: |
          mkdir -p release
          
          # Create source code archive
          git archive --format=zip --prefix=NidelvenRiverAdventure-Source/ -o release/Source-Code.zip HEAD
          
          # Add Unity builds if available
          if [ -d "artifacts/Build-StandaloneWindows64" ]; then
            cd artifacts/Build-StandaloneWindows64
            zip -r ../../release/NidelvenRiverAdventure-Windows.zip .
            cd ../..
          fi
          
          if [ -d "artifacts/Build-StandaloneLinux64" ]; then
            cd artifacts/Build-StandaloneLinux64
            zip -r ../../release/NidelvenRiverAdventure-Linux.zip .
            cd ../..
          fi
          
          if [ -d "artifacts/Build-StandaloneOSX" ]; then
            cd artifacts/Build-StandaloneOSX
            zip -r ../../release/NidelvenRiverAdventure-macOS.zip .
            cd ../..
          fi
          
          ls -la release/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/*
          draft: true
          prerelease: true
          generate_release_notes: true
          body: |
            ## Release ${{ github.ref_name }}
            
            ### Assets
            - **Source-Code.zip** - Complete source code
            - **NidelvenRiverAdventure-Windows.zip** - Windows x64 build
            - **NidelvenRiverAdventure-Linux.zip** - Linux x64 build
            - **NidelvenRiverAdventure-macOS.zip** - macOS build
            
            ### Build Instructions (from source)
            1. Download and extract Source-Code.zip
            2. Open in Unity 6000 LTS
            3. File → Build Settings → Build
